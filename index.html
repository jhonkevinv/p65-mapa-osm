<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoreo Coordenadas - P65</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <style>
        body, html, #map { margin: 0; padding: 0; height: 100%; width: 100%; font-family: Arial, sans-serif; }
        .leaflet-routing-container { display: none !important; }
        .popup-destino { font-weight: bold; color: #d32f2f; font-size: 13px; }
        .popup-usuario { font-weight: bold; color: #1976d2; font-size: 13px; }
        
        /* Botón flotante para centrar el mapa */
        .btn-centrar {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background-color: #ffffff;
            border: 2px solid rgba(0,0,0,0.2);
            border-radius: 4px;
            padding: 8px 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            color: #333333;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .btn-centrar:hover { background-color: #f4f4f4; }
    </style>
</head>
<body>

    <button class="btn-centrar" onclick="enfocarTodaLaRuta()">🔍 Centrar Ruta</button>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <script>
        var map = L.map('map').setView([-12.0463, -77.0427], 11);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        var controlRuta = null;
        var listaPuntosDestino = [];
        var marcadorUsuario = null; 

        var iconoUsuario = L.icon({
            iconUrl: 'https://maps.google.com/mapfiles/ms/icons/blue-dot.png', 
            iconSize: [40, 40], iconAnchor: [20, 40], popupAnchor: [0, -40]
        });

        var iconoDestino = L.icon({
            iconUrl: 'https://maps.google.com/mapfiles/ms/icons/red-dot.png',  
            iconSize: [35, 35], iconAnchor: [17, 35], popupAnchor: [0, -35]
        });

        function inicializarPuntos(puntos) {
            listaPuntosDestino = puntos;
            trazarRutaEstatica();

            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(actualizarSoloMarcadorGps, errorGps, {
                    enableHighAccuracy: true, maximumAge: 0
                });
            }
        }

        function trazarRutaEstatica() {
            if (listaPuntosDestino.length < 2) {
                if (listaPuntosDestino.length === 1) {
                    var p = listaPuntosDestino[0];
                    var m = L.marker([p.lat, p.lng], { icon: iconoDestino }).addTo(map);
                    m.bindPopup("<div class='popup-destino'>📍 Punto 1</div>").openPopup();
                    map.setView([p.lat, p.lng], 14);
                }
                return;
            }

            var waypointsProcesados = listaPuntosDestino.map(function(p) {
                return L.latLng(p.lat, p.lng);
            });

            controlRuta = L.Routing.control({
                waypoints: waypointsProcesados,
                lineOptions: { styles: [{ color: '#2b7ce9', weight: 6, opacity: 0.8 }] },
                addWaypoints: false,
                routeWhileDragging: false,
                createMarker: function(i, waypoint, n) {
                    var marcador = L.marker(waypoint.latLng, { icon: iconoDestino });
                    var numeroPunto = i + 1;
                    marcador.bindPopup("<div class='popup-destino'>📍 Punto " + numeroPunto + "</div>");
                    return marcador;
                }
            }).addTo(map);

            controlRuta.on('routesfound', function(e) {
                enfocarTodaLaRuta();
            });
        }

        // Nueva función global para centrar y encuadrar los puntos en pantalla
        function enfocarTodaLaRuta() {
            if (listaPuntosDestino.length === 0) return;
            
            var bounds = listaPuntosDestino.map(function(pt) { 
                return [pt.lat, pt.lng]; 
            });
            
            map.fitBounds(bounds, { padding: [50, 50] });
        }

        function actualizarSoloMarcadorGps(position) {
            var lat = position.coords.latitude;
            var lng = position.coords.longitude;

            if (marcadorUsuario === null) {
                marcadorUsuario = L.marker([lat, lng], { icon: iconoUsuario }).addTo(map);
                marcadorUsuario.bindPopup("<div class='popup-usuario'>🚗 Mi Ubicación Actual</div>");
            } else {
                marcadorUsuario.setLatLng([lat, lng]);
            }
            comprobarLlegadaAPuntos(lat, lng);
        }

        function comprobarLlegadaAPuntos(miLat, miLng) {
            if (listaPuntosDestino.length === 0) return;

            var miUbicacion = L.latLng(miLat, miLng);
            var proximoDestino = listaPuntosDestino[0];
            var puntoObjetivo = L.latLng(proximoDestino.lat, proximoDestino.lng);
            var distancia = miUbicacion.distanceTo(puntoObjetivo);

            if (distancia < 40) {
                listaPuntosDestino.shift(); 
                if (controlRuta !== null) { map.removeControl(controlRuta); }
                trazarRutaEstatica();
            }
        }

        function errorGps(err) { console.warn("Error leyendo el GPS: ", err.message); }

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const datosCompactos = urlParams.get('p'); 

            let puntosParaElMapa = [];

            if (datosCompactos) {
                try {
                    const bloques = decodeURIComponent(datosCompactos).split('|');
                    
                    bloques.forEach(function(bloque) {
                        const datos = bloque.split(',');
                        if (datos.length >= 2) {
                            puntosParaElMapa.push({
                                "lat": parseFloat(datos[0]),
                                "lng": parseFloat(datos[1])
                            });
                        }
                    });
                } catch (e) {
                    console.error("Error al procesar la URL de coordenadas:", e);
                }
            }

            if (puntosParaElMapa.length === 0) {
                puntosParaElMapa = [
                    {"lat": -12.6420, "lng": -76.6515},
                    {"lat": -12.5188, "lng": -76.6712}
                ];
            }

            inicializarPuntos(puntosParaElMapa);
        };
    </script>
</body>
</html>
