<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoreo de Rutas - P65</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    
    <style>
        body, html, #map { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            font-family: Arial, sans-serif;
        }
        .leaflet-routing-container { display: none !important; }
        
        .popup-destino { font-weight: bold; color: #d32f2f; font-size: 13px; }
        .popup-usuario { font-weight: bold; color: #1976d2; font-size: 13px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <script>
        var map = L.map('map').setView([-12.0463, -77.0427], 11);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        var controlRuta = null;
        var listaPuntosDestino = [];
        var marcadorUsuario = null; 

        var iconoUsuario = L.icon({
            iconUrl: 'https://maps.google.com/mapfiles/ms/icons/blue-dot.png', 
            iconSize: [40, 40],
            iconAnchor: [20, 40],
            popupAnchor: [0, -40]
        });

        var iconoDestino = L.icon({
            iconUrl: 'https://maps.google.com/mapfiles/ms/icons/red-dot.png',  
            iconSize: [35, 35],
            iconAnchor: [17, 35],
            popupAnchor: [0, -35]
        });

        function inicializarPuntos(puntos) {
            listaPuntosDestino = puntos;
            
            trazarRutaEstatica();

            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(actualizarSoloMarcadorGps, errorGps, {
                    enableHighAccuracy: true,
                    maximumAge: 0
                });
            } else {
                console.error("La geolocalización no está soportada por este navegador.");
            }
        }
        function trazarRutaEstatica() {
            if (listaPuntosDestino.length < 2) {
                if (listaPuntosDestino.length === 1) {
                    var p = listaPuntosDestino[0];
                    var m = L.marker([p.lat, p.lng], { icon: iconoDestino }).addTo(map);
                    m.bindPopup("<div class='popup-destino'>📍 " + p.info + "</div>").openPopup();
                    map.setView([p.lat, p.lng], 14);
                }
                return;
            }

            var waypointsProcesados = listaPuntosDestino.map(function(p) {
                return L.latLng(p.lat, p.lng);
            });

            controlRuta = L.Routing.control({
                waypoints: waypointsProcesados,
                lineOptions: {
                    styles: [{ color: '#2b7ce9', weight: 6, opacity: 0.8 }]
                },
                addWaypoints: false,
                routeWhileDragging: false,
                createMarker: function(i, waypoint, n) {
                    var datosPunto = listaPuntosDestino[i];
                    var marcador = L.marker(waypoint.latLng, { icon: iconoDestino });
                    
                    if (datosPunto && datosPunto.info) {
                        marcador.bindPopup("<div class='popup-destino'>📍 " + datosPunto.info + "</div>");
                    }
                    return marcador;
                }
            }).addTo(map);

            controlRuta.on('routesfound', function(e) {
                var bounds = waypointsProcesados.map(function(pt) { return [pt.lat, pt.lng]; });
                map.fitBounds(bounds, { padding: [50, 50] });
            });
        }

        function actualizarSoloMarcadorGps(position) {
            var lat = position.coords.latitude;
            var lng = position.coords.longitude;

            if (marcadorUsuario === null) {
                marcadorUsuario = L.marker([lat, lng], { icon: iconoUsuario }).addTo(map);
                marcadorUsuario.bindPopup("<div class='popup-usuario'>🚗 Mi Ubicación Actual</div>");
            } else {
                marcadorUsuario.setLatLng([lat, lng]);
            }

            comprobarLlegadaAPuntos(lat, lng);
        }

        function comprobarLlegadaAPuntos(miLat, miLng) {
            if (listaPuntosDestino.length === 0) return;

            var miUbicacion = L.latLng(miLat, miLng);
            var proximoDestino = listaPuntosDestino[0];
            var puntoObjetivo = L.latLng(proximoDestino.lat, proximoDestino.lng);
            
            var distancia = miUbicacion.distanceTo(puntoObjetivo);

            if (distancia < 40) {
                console.log("Punto alcanzado: " + proximoDestino.info);
                listaPuntosDestino.shift();
                
                if (controlRuta !== null) { 
                    map.removeControl(controlRuta); 
                }
                trazarRutaEstatica();
            }
        }

        function errorGps(err) { 
            console.warn("Error leyendo el GPS: ", err.message); 
        }

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const puntosParam = urlParams.get('puntos');

            let puntosParaElMapa = [];

            if (puntosParam) {
                try {
                    puntosParaElMapa = JSON.parse(decodeURIComponent(puntosParam));
                } catch (e) {
                    console.error("Error al procesar los puntos recibidos:", e);
                }
            }

            if (puntosParaElMapa.length === 0) {
                puntosParaElMapa = [
                    {"lat": -12.6420, "lng": -76.6515, "info": "Muestra 1: San Antonio"},
                    {"lat": -12.5188, "lng": -76.6712, "info": "Muestra 2: Chilca"},
                    {"lat": -12.0463, "lng": -77.0427, "info": "Muestra 3: Centro de Lima"}
                ];
            }

            inicializarPuntos(puntosParaElMapa);
        };
    </script>
</body>
</html>
